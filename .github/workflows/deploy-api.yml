name: Deploy API (Cloud Run)

on:
  push:
    branches: [master]
    paths:
      - 'functions/**'
      - 'shared/**'
  workflow_dispatch:

env:
  PROJECT_ID: sre-monitor-lcd
  REGION: australia-southeast1
  SERVICE_NAME: sre-monitor
  AR_REPO: sre-monitor-images

permissions:
  contents: read
  id-token: write

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: cd functions && npm ci
      - run: cd functions && npm test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci
      - run: npm run test:smoke

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend, smoke-test]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push container image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -f functions/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --set-secrets=GITHUB_OAUTH_CLIENT_ID=github-oauth-client-id:latest,GITHUB_OAUTH_CLIENT_SECRET=github-oauth-client-secret:latest,JWT_SECRET=jwt-secret:latest \
            --set-env-vars=GCP_BILLING_PROJECT_ID=sre-monitor-lcd,GCP_BILLING_DATASET=billing_export,GCP_BILLING_TABLE=gcp_billing_export_resource_v1_01163B_FA4421_0C1CFE

      - name: Summary
        run: |
          echo "### Deployed API to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** \`${{ env.SERVICE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region:** \`${{ env.REGION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
